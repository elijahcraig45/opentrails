version: '3.8'

services:
  postgis:
    image: postgis/postgis:17-3.4
    environment:
      POSTGRES_DB: opentrails
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./db_init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d opentrails"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
